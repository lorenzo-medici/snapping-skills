# snapcraft.yaml — Plugs and Layout Snippet Template
#
# Generated by the analyze-binary-for-snapping skill.
# Replace <PLACEHOLDERS> with values from the analysis.
# Delete sections that are not needed.
#
# This snippet is designed to be merged into an existing snapcraft.yaml.
# It does NOT include the full snapcraft.yaml schema (name, version, etc.).

# ─── APP DEFINITION (merge into your existing apps: section) ─────────────────
apps:
  <app-name>:
    command: bin/<wrapper-script>      # wrapper script that sets env vars and execs the real binary
    plugs:
      # Network interfaces
      - network                        # outbound TCP + /etc/resolv.conf
      # - network-bind                 # bind to ports < 1024 (CAP_NET_BIND_SERVICE)
      # - network-control              # CAP_NET_RAW / CAP_NET_ADMIN (store review required)

      # Device interfaces (uncomment as needed)
      # - serial-port                  # /dev/ttyUSB*, /dev/ttyACM*, /dev/ttyS*
      # - i2c                          # /dev/i2c-*
      # - spi                          # /dev/spidev*
      # - gpio                         # /dev/gpio*, /sys/class/gpio/
      # - raw-usb                      # /dev/bus/usb/
      # - camera                       # /dev/video*
      # - opengl                       # /dev/dri/, GPU acceleration
      # - bluetooth-control            # Bluetooth HCI devices

      # System interfaces (uncomment as needed)
      # - hardware-observe             # /dev/sysgenid and similar read-only hw info
      # - time-control                 # CAP_SYS_TIME — set system clock
      # - process-control              # signal processes outside snap's own group

# ─── LAYOUT DIRECTIVES ───────────────────────────────────────────────────────
# Layout entries redirect paths that are hardcoded inside the binary.
# $SNAP      = read-only content installed with the snap
# $SNAP_COMMON = writable, persists across snap upgrades (operator data, state DBs)
# $XDG_RUNTIME_DIR = ephemeral per-user runtime directory, cleared on reboot

layout:
  # ── Valid layout examples ────────────────────────────────────────────────
  # IMPORTANT: target paths must NOT be:
  #   • In the denylist: /boot /dev /home /lib/firmware /usr/lib/firmware
  #     /lib/modules /usr/lib/modules /lost+found /media /proc /run /var/run
  #     /sys /tmp /var/lib/snapd /var/snap
  #   • A direct child of '/' (e.g. /nix, /certs, /data are all FORBIDDEN).
  # See references/layout-constraints.md for the full rules and workarounds.

  # Shared library at non-root depth — read-only from snap content
  # /usr/lib/<libname>:
  #   bind: $SNAP/lib/<libname>

  # Application state database (e.g. SoftHSM tokens, SQLite DB) — writable
  # /var/lib/<app>:
  #   bind: $SNAP_COMMON/<app>

  # Read-only application config bundled in the snap  (depth ≥ 2 → valid)
  # /etc/<app>:
  #   bind: $SNAP/etc/<app>

  # Read-write application config managed by the operator  (depth ≥ 2 → valid)
  # /etc/<app>:
  #   bind: $SNAP_COMMON/etc/<app>

  # TLS certificates exposed via a deeper path  (depth ≥ 2 → valid)
  # /etc/<app>/certs:
  #   bind: $SNAP_COMMON/certs

  # ── Forbidden — do NOT add these ────────────────────────────────────────
  # /<single-component>  → root-level direct children of / are forbidden.
  # /run   → in denylist. Use $XDG_RUNTIME_DIR instead.
  # /tmp   → in denylist. Use $SNAP_DATA/tmp or $XDG_RUNTIME_DIR.
  # See references/layout-constraints.md §2 for the full denylist.

# ─── WRAPPER SCRIPT (create as wrappers/<app-name>.sh in your snap source) ───
#
# The wrapper script:
#   1. Bootstraps writable dirs/files in $SNAP_COMMON on first run
#   2. Exports env vars that redirect hardcoded paths to $SNAP or $SNAP_COMMON
#   3. Execs the real binary
#
# Example:
#
#   #!/bin/bash
#   set -e
#
#   # Create writable directories on first run
#   mkdir -p "$SNAP_COMMON/config" "$SNAP_COMMON/data"
#
#   # Redirect any hardcoded config/data paths found in Phase 4e
#   export <APP>_CONFIG_PATH="$SNAP_COMMON/config"
#   export <APP>_DATA_DIR="$SNAP_COMMON/data"
#
#   exec "$SNAP/bin/<real-binary>" "$@"
